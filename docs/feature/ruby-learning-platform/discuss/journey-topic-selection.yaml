journey:
  id: topic-selection
  name: "Topic Selection — Curriculum Navigation and Progress Orientation"
  feature_id: ruby-learning-platform
  date: "2026-03-09"
  persona: marcus-chen
  scenario: "Week 2 — 14-day streak, 8 lessons complete, wants to understand full arc"
  primary_jobs:
    - js-1-syntax-transfer
    - js-5-progress-visibility
  opportunities:
    - opp-1-expert-content
    - opp-7-progress-visibility
  emotional_arc:
    start: curiosity
    midpoints:
      - orientation
      - agency
    end: anticipation

persona:
  id: marcus-chen
  name: "Marcus Chen"
  context: "Week 2; 14-day streak; 12 concepts mastered; 8 in review; 4 new; 8 of 25 lessons done"
  motivation: "Understand the full curriculum arc and select a focus for the next week"
  state:
    streak_count: 14
    mastered_count: 12
    in_review_count: 8
    new_count: 4
    lessons_completed: 8
    current_module: 2
    next_available_lesson: 9
    retention_rate: 0.73

steps:
  - id: step-1
    name: "Dashboard Entry"
    action: "Marcus presses 'g d' to navigate to the progress dashboard"
    touchpoint: "Dashboard view with key metrics summary"
    marcus_thought: "I want the full picture. How am I actually doing after two weeks?"
    emotion: curious
    emotional_intensity: 7
    pain_points:
      - "Dashboard as dead end (no call to action) reduces utility"
    shared_artifacts_read:
      - streak_count
      - mastered_count
      - retention_rate
    shared_artifacts_written: []

  - id: step-2
    name: "Mastery Overview"
    action: "Marcus reads concept status counts on dashboard"
    touchpoint: "Dashboard metrics panel — Mastered / In Review / New / Remaining"
    marcus_thought: "12 mastered, 8 in review, 4 new. That's 24 of 25 concepts engaged. Real progress."
    emotion: oriented
    emotional_intensity: 7
    pain_points:
      - "Abstract numbers without visual context feel hollow"
    shared_artifacts_read:
      - mastered_count
      - in_review_count
      - new_count
    shared_artifacts_written: []

  - id: step-3
    name: "Retention Rate"
    action: "Marcus reads his retention rate metric"
    touchpoint: "Dashboard metrics panel — retention_rate with calculation description"
    marcus_thought: "73% retention rate with a plain explanation of the formula. I trust this."
    emotion: trusting
    emotional_intensity: 7
    pain_points:
      - "Opaque metric without explanation creates distrust"
    shared_artifacts_read:
      - retention_rate
    shared_artifacts_written: []

  - id: step-4
    name: "Curriculum Map Navigation"
    action: "Marcus navigates to curriculum overview using 'c' keyboard shortcut"
    touchpoint: "Curriculum overview — 5 modules, 25 lessons, status per lesson"
    marcus_thought: "I can see all 5 modules. 8 lessons done. Lesson 9 is next. Lesson 10 is locked."
    emotion: oriented-positioned
    emotional_intensity: 8
    pain_points:
      - "Module walls that hide lesson contents create disorientation"
    shared_artifacts_read:
      - curriculum_list
      - lesson_id
      - lesson_status
    shared_artifacts_written: []

  - id: step-5
    name: "Prerequisite Gate Encounter"
    action: "Marcus tries to open Lesson 15 — sees it is locked with prerequisites shown"
    touchpoint: "Lesson 15 detail view with prerequisite list and estimated sessions to unlock"
    marcus_thought: "Makes sense. I need Lessons 11-14 first. About 3 more sessions. Not far."
    emotion: accepting-motivated
    emotional_intensity: 6
    pain_points:
      - "Opaque gating without rationale feels arbitrary and punitive"
    shared_artifacts_read:
      - lesson_id
      - prerequisite_ids
      - lesson_status
    shared_artifacts_written: []

  - id: step-6
    name: "Lesson 9 Detail Card"
    action: "Marcus opens Lesson 9: Method Objects detail view"
    touchpoint: "Lesson detail card — topic, time estimate, Python/Java comparison, exercise type"
    marcus_thought: "Method objects. `&method(:name)`. This is the Ruby-specific thing I've been missing."
    emotion: recognition-relevance
    emotional_intensity: 9
    pain_points:
      - "Thin lesson card (title only) gives no basis for evaluating whether this is the right next lesson"
    shared_artifacts_read:
      - lesson_id
      - lesson_content
      - prerequisite_ids
    shared_artifacts_written: []

  - id: step-7
    name: "Lesson Selection"
    action: "Marcus presses Enter to select Lesson 9 for his next session"
    touchpoint: "Lesson detail card — 'Study Next Session' action"
    marcus_thought: "That's the one. It's queued for tomorrow."
    emotion: agency
    emotional_intensity: 8
    pain_points:
      - "Forced sequential order removes agency; must preserve choice within unlocked lessons"
    shared_artifacts_read:
      - lesson_id
    shared_artifacts_written:
      - review_queue

  - id: step-8
    name: "Module Progress View"
    action: "Marcus views Module 2 progress: 3 of 5 lessons complete"
    touchpoint: "Module progress view with lesson-by-lesson status and unlock path"
    marcus_thought: "3 of 5 in Module 2. Lesson 9 gets me to 4/5. Lesson 10 (Enumerable) unlocks Module 3."
    emotion: motivated-proximate
    emotional_intensity: 8
    pain_points:
      - "No module-level progress makes the 25-lesson arc feel undifferentiated"
    shared_artifacts_read:
      - module_id
      - module_progress
      - lesson_status
    shared_artifacts_written: []

  - id: step-9
    name: "Full Arc Anticipation"
    action: "Marcus scrolls forward to see Module 4 and 5 content"
    touchpoint: "Curriculum map — modules 4 and 5 visible (locked, titles visible)"
    marcus_thought: "Pattern matching in Module 4. Struct and Data in Module 5. That's modern Ruby. Worth the journey."
    emotion: anticipation
    emotional_intensity: 8
    pain_points:
      - "25 lessons shown flat (no grouping) creates overwhelm rather than motivation"
    shared_artifacts_read:
      - curriculum_list
    shared_artifacts_written: []

  - id: step-10
    name: "Return to Dashboard"
    action: "Marcus presses Esc to return to dashboard"
    touchpoint: "Dashboard view"
    marcus_thought: "I know where I am. I know what's next. Two more sessions to finish Module 2."
    emotion: satisfied-grounded
    emotional_intensity: 8
    pain_points: []
    shared_artifacts_read:
      - streak_count
      - mastered_count
    shared_artifacts_written: []

integration_checkpoints:
  - id: ic-1
    step: step-4
    check: "lesson_status (Mastered/In Review/New/Locked) must derive from SM-2 state, not independent DB flag"
    failure_risk: "Curriculum shows Mastered for concept that SM-2 has scheduled for re-review"

  - id: ic-2
    step: step-5
    check: "prerequisite_ids gate must check lesson_status of each prerequisite in real time"
    failure_risk: "Locked lesson shows as available after prerequisite is completed in a concurrent session"

  - id: ic-3
    step: step-8
    check: "module_progress percentage recalculates immediately when lesson_status changes"
    failure_risk: "Module shows stale progress % after Marcus completes a lesson"

  - id: ic-4
    step: step-7
    check: "Selecting lesson updates review_queue for next session; visible on session start screen"
    failure_risk: "Lesson does not appear in tomorrow's session start screen"

  - id: ic-5
    step: step-3
    check: "retention_rate calculation is documented (% correct on SM-2 reviews, rolling 14 days)"
    failure_risk: "Marcus sees metric he cannot interpret or trust"

shared_artifacts:
  read:
    - streak_count
    - mastered_count
    - in_review_count
    - new_count
    - retention_rate
    - curriculum_list
    - lesson_id
    - lesson_status
    - lesson_content
    - prerequisite_ids
    - module_id
    - module_progress
    - review_queue
  written:
    - review_queue
