journey:
  id: onboarding
  name: "Onboarding — First Visit to First SM-2 Scheduling"
  feature_id: ruby-learning-platform
  date: "2026-03-09"
  persona: marcus-chen
  primary_jobs:
    - js-1-syntax-transfer
    - js-2-daily-habit
  opportunities:
    - opp-1-expert-content
    - opp-2-automated-queue
    - opp-3-session-discipline
  emotional_arc:
    start: skepticism
    midpoints:
      - recognition
      - competence
    end: commitment

persona:
  id: marcus-chen
  name: "Marcus Chen"
  role: "Senior software engineer"
  background: "8 years Python + Java; joining a Ruby on Rails team"
  constraints:
    daily_time_budget: "15 minutes (pre-standup window)"
    keyboard_preference: "vim/terminal native; mouse is a context switch"
    learning_style: "information-dense; skips basics; values analogies to known languages"
  prior_tools:
    - name: executeprogram.com
      verdict: "Too beginner-calibrated for Ruby"
  commitment_signal: "builder = user; highest possible commitment"

steps:
  - id: step-1
    name: "Arrival"
    action: "Marcus visits landing page"
    touchpoint: "Landing page — UVP headline + curriculum preview link"
    marcus_thought: "I've seen this before. Let me check if it actually skips the basics."
    emotion: skeptical
    emotional_intensity: 3
    pain_points:
      - "Cynicism from past tool disappointments"
    shared_artifacts_read: []
    shared_artifacts_written: []

  - id: step-2
    name: "Curriculum Preview"
    action: "Marcus reads lesson topic list"
    touchpoint: "Curriculum overview page — 25 lessons listed with module groupings"
    marcus_thought: "Lesson 1 is blocks and procs — not variables. This is actually different."
    emotion: surprised-interest
    emotional_intensity: 6
    pain_points: []
    shared_artifacts_read:
      - curriculum_list
    shared_artifacts_written: []

  - id: step-3
    name: "Account Creation"
    action: "Marcus registers with email"
    touchpoint: "Sign-up form — email field only + experience confirmation"
    marcus_thought: "Minimal form. Good. I'm not filling out a profile for a learning tool."
    emotion: relieved
    emotional_intensity: 6
    pain_points:
      - "Long forms kill onboarding momentum"
    shared_artifacts_read: []
    shared_artifacts_written:
      - user_email
      - user_id

  - id: step-4
    name: "Experience Confirmation"
    action: "Marcus selects 'Yes — Python, Java, or similar'"
    touchpoint: "Single-question experience modal"
    marcus_thought: "Finally. It's asking if I'm an expert instead of assuming I'm a beginner."
    emotion: recognized
    emotional_intensity: 8
    pain_points: []
    shared_artifacts_read: []
    shared_artifacts_written:
      - experience_level

  - id: step-5
    name: "First Lesson"
    action: "Marcus reads Lesson 1: Ruby Blocks"
    touchpoint: "Lesson view with Python/Java side-by-side comparison panel"
    marcus_thought: "This maps directly to what I know from Python. I understand blocks in 90 seconds."
    emotion: competent-engaged
    emotional_intensity: 8
    pain_points:
      - "Dense content could lose pacing if not well structured"
    shared_artifacts_read:
      - lesson_id
      - lesson_content
      - experience_level
    shared_artifacts_written: []

  - id: step-6
    name: "First Exercise"
    action: "Marcus types answer to fill-in-blank exercise; presses Enter to submit"
    touchpoint: "Exercise input panel with 30-second countdown timer"
    marcus_thought: "Enter to submit — exactly right. No mouse needed."
    emotion: focused-flow
    emotional_intensity: 7
    pain_points:
      - "Timer anxiety if exercise is harder than expected"
    shared_artifacts_read:
      - exercise_id
      - lesson_id
    shared_artifacts_written:
      - timer_seconds
      - answer_result

  - id: step-7
    name: "Answer Feedback"
    action: "Marcus sees correct-answer feedback with explanation"
    touchpoint: "Feedback panel below exercise input"
    marcus_thought: "I was right. The explanation reinforces exactly why select works here."
    emotion: satisfied-confident
    emotional_intensity: 8
    pain_points:
      - "Feedback must be useful even on correct answers; not just 'Correct!'"
    shared_artifacts_read:
      - answer_result
      - explanation
    shared_artifacts_written: []

  - id: step-8
    name: "SM-2 Scheduling Confirmation"
    action: "Marcus reads scheduling confirmation: 'Review in 3 days'"
    touchpoint: "SM-2 scheduling panel — shows next_review_date and plain-language reason"
    marcus_thought: "The system knows when to ask me again. I don't have to remember."
    emotion: relieved-trusting
    emotional_intensity: 9
    pain_points:
      - "Black-box anxiety if scheduling rationale is not shown"
    shared_artifacts_read:
      - exercise_id
      - answer_result
    shared_artifacts_written:
      - next_review_date
      - sm2_interval
      - sm2_ease_factor
      - review_queue

  - id: step-9
    name: "Session Summary"
    action: "Marcus reads session summary: time taken, lesson completed, streak"
    touchpoint: "Session end page with metrics"
    marcus_thought: "4 minutes. I learned something real. I can do this every morning."
    emotion: committed-proud
    emotional_intensity: 9
    pain_points: []
    shared_artifacts_read:
      - session_duration
      - streak_count
      - review_queue
    shared_artifacts_written:
      - session_duration
      - streak_count

  - id: step-10
    name: "Email Opt-in"
    action: "Marcus confirms email for daily review queue notifications"
    touchpoint: "Email confirmation prompt in session summary footer"
    marcus_thought: "A daily queue email — that's exactly the habit trigger I want."
    emotion: engaged-forming-habit
    emotional_intensity: 8
    pain_points:
      - "Opt-in must not feel like subscribing to a newsletter"
    shared_artifacts_read:
      - user_email
    shared_artifacts_written:
      - email_preferences

integration_checkpoints:
  - id: ic-1
    step: step-4
    check: "experience_level must persist to curriculum_list filtering"
    failure_risk: "Marcus sees beginner content after confirming expert mode"

  - id: ic-2
    step: step-8
    check: "SM-2 creates review entry with correct interval (3 days default for first exposure)"
    failure_risk: "review_queue empty or wrong date on Day 3"

  - id: ic-3
    step: step-10
    check: "user_email links to review_queue and triggers email on next_review_date"
    failure_risk: "Marcus receives no email; habit trigger never fires"

  - id: ic-4
    step: step-9
    check: "session_duration reflects actual elapsed time accurately"
    failure_risk: "Session summary shows wrong time; trust broken on first use"

shared_artifacts:
  read:
    - curriculum_list
    - lesson_id
    - lesson_content
    - exercise_id
    - answer_result
    - explanation
    - sm2_interval
    - next_review_date
  written:
    - user_email
    - user_id
    - experience_level
    - timer_seconds
    - answer_result
    - sm2_interval
    - sm2_ease_factor
    - next_review_date
    - review_queue
    - session_duration
    - streak_count
    - email_preferences
