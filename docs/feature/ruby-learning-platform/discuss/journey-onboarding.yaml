journey:
  name: "First-Time Onboarding"
  goal: "Ana launches the platform for the first time, understands the curriculum, and completes her first exercise within 5 minutes without feeling like a beginner"
  persona: "Ana Folau — senior Python developer, zero Ruby experience, learning for Ruby-on-Rails team transition"
  job_story_ref: "JS-01"

  emotional_arc:
    start: "Skeptical and impatient — expects another beginner tool"
    middle: "Relieved and engaged — tool treats her as an expert"
    end: "Confident and committed — knows exactly what tomorrow looks like"

steps:
  - id: 1
    name: "Welcome and Calibration Signal"
    action: "User opens platform for first time"

    tui_mockup: |
      +------------------------------------------------------------+
      | Ruby for Experienced Developers                            |
      |                                                            |
      | This tool assumes you know:                               |
      |   [x] Variables and types                                 |
      |   [x] OOP (classes, inheritance, interfaces)              |
      |   [x] Control flow (if/else, loops, exceptions)           |
      |   [x] Functions and basic data structures                 |
      |                                                            |
      | It teaches: Ruby-specific syntax, idioms, and patterns    |
      | that differ from Python and Java.                         |
      |                                                            |
      | Press [Enter] to begin your first session                 |
      +------------------------------------------------------------+

    shared_artifacts:
      - name: "assumed_knowledge_list"
        source: "app/config/onboarding.yml"
        displayed_as: "bulleted list of assumed concepts"
        consumers: ["step 1 welcome screen"]

    emotional_state:
      entry: "Skeptical — expects beginner content"
      exit: "Relieved — explicitly told what will be skipped"

    integration_checkpoint: |
      Platform has not initialized SM-2 state yet. No user data exists.
      This screen requires no database reads. Pure static content.

    gherkin: |
      Scenario: First launch shows expert-calibration messaging
        Given Ana opens the platform for the first time
        When the landing screen loads
        Then she sees a list of assumed programming concepts
        And she sees a statement that the tool teaches Ruby-specific differences
        And no login or account creation is required

  - id: 2
    name: "Curriculum Overview — Lesson Tree"
    action: "User presses Enter; curriculum tree loads"

    tui_mockup: |
      +------------------------------------------------------------+
      | Curriculum — 25 Lessons across 5 Modules                  |
      |                                                            |
      | [Module 1: Ruby Fundamentals for Polyglots]  AVAILABLE    |
      |  1 Syntax Differences       [ ] Not started               |
      |  2 String Interpolation     [ ] Locked (needs L1)         |
      |  3 Symbols                  [ ] Locked (needs L1)         |
      |  4 Ranges                   [ ] Locked (needs L2,L3)      |
      |  5 Array Methods            [ ] Locked (needs L4)         |
      |                                                            |
      | [Module 2: Methods and Blocks]              LOCKED         |
      | [Module 3: Ruby Object Model]               LOCKED         |
      | [Module 4: Ruby Idioms]                     LOCKED         |
      | [Module 5: Standard Library Essentials]     LOCKED         |
      |                                                            |
      | [j/k] Navigate  [Enter] Start Lesson 1  [?] Help          |
      +------------------------------------------------------------+

    shared_artifacts:
      - name: "curriculum_structure"
        source: "db/curriculum/lessons.yml"
        displayed_as: "module/lesson hierarchy with status icons"
        consumers: ["step 2 curriculum view", "step 5 lesson prerequisites", "topic selection journey"]
      - name: "lesson_status"
        source: "db/progress/user_progress"
        displayed_as: "[ ] not started, [x] complete, [~] locked"
        consumers: ["step 2 curriculum view", "topic selection journey", "progress dashboard"]
      - name: "prerequisite_graph"
        source: "db/curriculum/prerequisites.yml"
        displayed_as: "(needs L1), (needs L2,L3)"
        consumers: ["step 2 curriculum view", "step 3 lesson lock screen", "topic selection journey"]

    emotional_state:
      entry: "Relieved after calibration signal"
      exit: "Curious — can see the full curriculum structure"

    integration_checkpoint: |
      Prerequisite graph must be initialized for new user.
      Lesson 1 must be in 'available' state with all others 'locked'.
      Module expansion (j/k) must work for first lesson without SM-2 state.

    keyboard_navigation:
      - key: "j"
        action: "Move cursor down one lesson"
      - key: "k"
        action: "Move cursor up one lesson"
      - key: "Enter"
        action: "Select highlighted lesson (start if available, show lock screen if locked)"
      - key: "?"
        action: "Show keyboard shortcut reference overlay"
      - key: "Esc"
        action: "No-op on first launch (no previous screen)"

    gherkin: |
      Scenario: Curriculum tree shows correct lock states on first launch
        Given Ana has completed the welcome screen
        When the curriculum tree loads
        Then Lesson 1 is shown as available (not locked)
        And Lessons 2-25 are shown as locked with prerequisites listed
        And Module 1 is expanded showing individual lessons
        And Modules 2-5 are collapsed showing only module names

  - id: 3
    name: "Lesson Preview"
    action: "User presses Enter on Lesson 1; lesson preview loads"

    tui_mockup: |
      +------------------------------------------------------------+
      | Lesson 1: Ruby Syntax Differences                          |
      | Module 1 of 5  |  ~4 min  |  3 exercises                  |
      |                                                            |
      | What this covers:                                          |
      |   - No semicolons. No type declarations.                  |
      |   - def/end instead of def: and indentation               |
      |   - puts vs print vs p                                     |
      |   - nil vs None, true/false vs True/False                  |
      |                                                            |
      | What this DOES NOT cover:                                  |
      |   - What variables are                                     |
      |   - Control flow basics                                    |
      |   - OOP fundamentals                                       |
      |                                                            |
      | [Enter] Start  [Esc] Back to curriculum                    |
      +------------------------------------------------------------+

    shared_artifacts:
      - name: "lesson_title"
        source: "db/curriculum/lessons.yml"
        displayed_as: "${lesson_title}"
        consumers: ["step 3 preview", "step 4 exercise header", "step 5 feedback header", "step 6 summary"]
      - name: "lesson_duration"
        source: "db/curriculum/lessons.yml (derived: exercise_count * 60s + reading_time)"
        displayed_as: "~${lesson_duration} min"
        consumers: ["step 3 preview", "step 6 summary"]
      - name: "exercise_count"
        source: "db/curriculum/exercises.yml (count per lesson)"
        displayed_as: "${exercise_count} exercises"
        consumers: ["step 3 preview", "step 4 progress indicator", "step 6 summary"]

    emotional_state:
      entry: "Curious about the lesson"
      exit: "Engaged — scope confirmed, starting"

    integration_checkpoint: |
      Lesson metadata must be loadable before exercises begin.
      'What this DOES NOT cover' section must be sourced from lesson metadata,
      not hardcoded — ensures it stays accurate as lesson content evolves.

    keyboard_navigation:
      - key: "Enter"
        action: "Start Lesson 1 exercises"
      - key: "Esc"
        action: "Return to curriculum tree"

    gherkin: |
      Scenario: Lesson preview shows scope before starting
        Given Ana has selected Lesson 1 from the curriculum tree
        When the lesson preview loads
        Then she sees a list of what the lesson covers
        And she sees a list of what the lesson explicitly does NOT cover
        And she sees the estimated duration and exercise count
        And she can start or return to curriculum without commitment

  - id: 4
    name: "First Exercise"
    action: "User presses Enter to start; first exercise loads with 30-second timer"

    tui_mockup: |
      +------------------------------------------------------------+
      | Exercise 1 of 3  |  Lesson 1  |  [========          ] 15s |
      |                                                            |
      | In Python you write:                                       |
      |   def greet(name):                                        |
      |       return f"Hello, {name}"                             |
      |                                                            |
      | How would you write this in Ruby?                          |
      |                                                            |
      | > _                                                        |
      |                                                            |
      | [Enter] Submit  [Tab] Hint  [Esc] Skip                    |
      +------------------------------------------------------------+

    shared_artifacts:
      - name: "timer_remaining"
        source: "session/exercise_timer (30s countdown)"
        displayed_as: "progress bar + seconds remaining"
        consumers: ["step 4 exercise view"]
      - name: "exercise_progress"
        source: "session/runtime"
        displayed_as: "Exercise N of M"
        consumers: ["step 4 exercise view", "step 5 feedback view"]

    emotional_state:
      entry: "Engaged — ready to test knowledge"
      exit: "Focused — actively recalling"

    integration_checkpoint: |
      Timer must start when exercise renders, not when user first types.
      SM-2 state does not exist yet; this is the initialization exercise.
      Answer is evaluated for SM-2 initial interval setting.

    keyboard_navigation:
      - key: "Enter"
        action: "Submit answer"
      - key: "Tab"
        action: "Show hint (one hint per exercise, consumes hint slot)"
      - key: "Esc"
        action: "Skip exercise (marks as skipped in SM-2, not failed)"

    gherkin: |
      Scenario: Exercise timer starts automatically
        Given Ana has started Lesson 1
        When the first exercise loads
        Then a 30-second countdown timer is visible
        And the timer starts without requiring any user action
        And the answer input field has keyboard focus

      Scenario: Timer expiry shows answer automatically
        Given Ana is on Exercise 1 and has not submitted an answer
        When the 30-second timer expires
        Then the correct answer is shown automatically
        And Ana's attempt is marked as missed
        And the exercise advances after a 3-second pause

  - id: 5
    name: "Exercise Feedback"
    action: "User submits answer; feedback rendered immediately"

    tui_mockup: |
      +------------------------------------------------------------+
      | Correct.                                                   |
      |                                                            |
      | def greet(name)                                           |
      |   "Hello, #{name}"                                        |
      | end                                                        |
      |                                                            |
      | Ruby's string interpolation uses #{} not f"".             |
      | Implicit return means the last expression is returned.    |
      | No colon after method signature. End with `end`.          |
      |                                                            |
      | [Enter] Next exercise  [?] See full explanation            |
      +------------------------------------------------------------+

    shared_artifacts:
      - name: "correct_answer"
        source: "db/curriculum/exercises.yml"
        displayed_as: "code block with syntax highlighting"
        consumers: ["step 5 feedback", "step 5 timer expiry fallback"]
      - name: "explanation_text"
        source: "db/curriculum/exercises.yml"
        displayed_as: "plain text explanation after answer"
        consumers: ["step 5 feedback"]

    emotional_state:
      entry: "Focused — waiting for verdict"
      exit: "Satisfied — precise, respectful feedback"

    integration_checkpoint: |
      SM-2 initial ease factor must be set based on answer correctness.
      'Correct' / 'Incorrect' / 'Partial' states must be explicitly stored.

    keyboard_navigation:
      - key: "Enter"
        action: "Advance to next exercise (or session complete if last)"
      - key: "?"
        action: "Expand full explanation (if more detail available)"

    gherkin: |
      Scenario: Correct answer shows explanation immediately
        Given Ana has submitted a correct answer to Exercise 1
        When the feedback screen loads
        Then she sees "Correct." as the first word
        And she sees the canonical Ruby answer with syntax
        And she sees an explanation of the Ruby-specific difference
        And no score, points, or badges are shown

  - id: 6
    name: "Session Complete — First Session Summary"
    action: "All exercises complete; session summary renders"

    tui_mockup: |
      +------------------------------------------------------------+
      | Lesson 1 complete.                                         |
      |                                                            |
      | Today: 3 exercises  |  1 lesson  |  ~4 minutes             |
      |                                                            |
      | Review queue: SM-2 will schedule these exercises           |
      | for review based on your answers.                          |
      |                                                            |
      | Next session: Lesson 2 (String Interpolation)              |
      | Estimated review queue: 2 exercises                        |
      |                                                            |
      | [Enter] Done  [n] Start Lesson 2 now                      |
      +------------------------------------------------------------+

    shared_artifacts:
      - name: "next_lesson_title"
        source: "db/curriculum/prerequisites.yml (resolver: next available after current)"
        displayed_as: "Lesson 2 (${next_lesson_title})"
        consumers: ["step 6 summary", "daily session step 1"]
      - name: "sm2_next_review_count"
        source: "sm2_engine (computed after session ends)"
        displayed_as: "Estimated review queue: N exercises"
        consumers: ["step 6 summary", "daily session step 1"]

    emotional_state:
      entry: "Satisfied — lesson done"
      exit: "Committed — clear picture of next session"

    integration_checkpoint: |
      SM-2 engine must compute next-review intervals before this screen renders.
      next_lesson_title must be resolved from prerequisite graph, not hardcoded.
      'Done' action must persist SM-2 state to storage before exiting.

    keyboard_navigation:
      - key: "Enter"
        action: "Exit to dashboard / home"
      - key: "n"
        action: "Start Lesson 2 immediately (skip saving for next session)"

    gherkin: |
      Scenario: First session summary initializes SM-2
        Given Ana has completed all exercises in Lesson 1
        When the session complete screen renders
        Then she sees a count of exercises completed
        And she sees the SM-2 review schedule explanation
        And she sees the next lesson title derived from the prerequisite graph
        And she sees an estimated review count for tomorrow's session

integration_validation:
  shared_artifact_consistency:
    - artifact: "lesson_title"
      must_match_across: [2, 3, 4, 5, 6]
      failure_message: "Lesson title shown inconsistently across onboarding steps"
    - artifact: "exercise_count"
      must_match_across: [3, 4]
      failure_message: "Exercise count in preview differs from actual exercise count"
    - artifact: "next_lesson_title"
      must_match_across: [6, "daily_session_step_1"]
      failure_message: "Next lesson shown on summary differs from session start screen"
    - artifact: "prerequisite_graph"
      must_match_across: [2, "topic_selection_step_1"]
      failure_message: "Lock states in curriculum tree must be consistent across views"
