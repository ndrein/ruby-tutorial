journey:
  id: daily-session
  name: "Daily Session — Morning Email Through Session Summary"
  feature_id: ruby-learning-platform
  date: "2026-03-09"
  persona: marcus-chen
  scenario: "Week 1, Day 7 (Thursday morning — established habit, 7-day streak)"
  primary_jobs:
    - js-2-daily-habit
    - js-3-automated-review-queue
  opportunities:
    - opp-2-automated-queue
    - opp-3-session-discipline
    - opp-4-keyboard-nav
  emotional_arc:
    start: intent
    midpoints:
      - flow
      - satisfaction
    end: streak-pride

persona:
  id: marcus-chen
  name: "Marcus Chen"
  context: "Week 1 complete; 6-day streak entering today; 12 concepts mastered"
  time_window: "8:47 AM — 13 minutes before standup"
  state:
    streak_count: 6
    mastered_count: 12
    in_review_count: 8
    lessons_completed: 2
    current_lesson: 3

steps:
  - id: step-1
    name: "Email Arrival"
    action: "Marcus reads daily digest email at 8:00 AM"
    touchpoint: "Daily digest email — subject line shows queue size + estimated time"
    marcus_thought: "4 reviews and a lesson option. About 10 minutes. I have time before standup."
    emotion: intent
    emotional_intensity: 7
    pain_points:
      - "Email at wrong time of day kills the habit trigger"
    shared_artifacts_read:
      - review_queue
      - queue_count
      - streak_count
    shared_artifacts_written: []
    constraints:
      email_delivery_time: "configurable by user during onboarding"

  - id: step-2
    name: "App Open via Email Link"
    action: "Marcus clicks email link; app opens directly to session start screen"
    touchpoint: "Session start screen — today's queue listed, new lesson option, budget shown"
    marcus_thought: "I can see the full list before I start. Good."
    emotion: oriented
    emotional_intensity: 7
    pain_points:
      - "Ambiguity about queue content creates hesitation at session start"
    shared_artifacts_read:
      - review_queue
      - lesson_id
      - streak_count
      - time_remaining
    shared_artifacts_written: []

  - id: step-3
    name: "Review Exercise 1"
    action: "Marcus completes first SM-2 review exercise (Ruby Symbols vs Strings)"
    touchpoint: "Exercise panel — exercise 1 of 4, 30-second timer, Enter to submit"
    marcus_thought: "Symbols are immutable identifiers. :hello vs 'hello'. I remember this."
    emotion: confident
    emotional_intensity: 7
    pain_points:
      - "Timer pressure if exercise difficulty spikes unexpectedly"
    shared_artifacts_read:
      - exercise_id
      - review_queue
    shared_artifacts_written:
      - sm2_score
      - answer_result
      - timer_seconds

  - id: step-4
    name: "Review Exercise 2"
    action: "Marcus completes second SM-2 review exercise (Blocks with yield)"
    touchpoint: "Exercise panel — exercise 2 of 4"
    marcus_thought: "Yield... yield calls the block. Oh right. That's how it works."
    emotion: recognition-recall
    emotional_intensity: 8
    pain_points: []
    shared_artifacts_read:
      - exercise_id
      - review_queue
    shared_artifacts_written:
      - sm2_score
      - answer_result

  - id: step-5
    name: "Review Exercise 3"
    action: "Marcus completes third review exercise (attr_accessor)"
    touchpoint: "Exercise panel — exercise 3 of 4"
    marcus_thought: "attr_accessor is muscle memory now. Fast answer."
    emotion: fluent-mastery
    emotional_intensity: 6
    pain_points: []
    shared_artifacts_read:
      - exercise_id
    shared_artifacts_written:
      - sm2_score
      - answer_result

  - id: step-6
    name: "Review Exercise 4"
    action: "Marcus completes fourth review exercise (Comparable module)"
    touchpoint: "Exercise panel — exercise 4 of 4"
    marcus_thought: "Comparable... the spaceship operator <=>. I'll go with that."
    emotion: productive-uncertainty
    emotional_intensity: 7
    pain_points:
      - "SM-2 must time this correctly — uncertainty without forgetting is the ideal state"
    shared_artifacts_read:
      - exercise_id
    shared_artifacts_written:
      - sm2_score
      - answer_result

  - id: step-7
    name: "Review Queue Complete"
    action: "Marcus sees queue summary: 4 exercises completed, time taken, next review dates"
    touchpoint: "Queue summary panel with per-exercise next-review dates"
    marcus_thought: "4 done, 3 minutes 47 seconds. Queue is done. Now I have 11 minutes left."
    emotion: satisfied
    emotional_intensity: 8
    pain_points: []
    shared_artifacts_read:
      - queue_count
      - review_duration
      - time_remaining
    shared_artifacts_written:
      - review_duration

  - id: step-8
    name: "New Lesson Option"
    action: "Marcus is presented with optional Lesson 3: Procs vs Lambdas"
    touchpoint: "Lesson prompt at bottom of queue summary — includes time estimate and budget remaining"
    marcus_thought: "3 minutes estimated. 11 minutes remaining. Yes, I'll do it."
    emotion: agency
    emotional_intensity: 8
    pain_points:
      - "Mandatory lesson after review would remove the sense of choice and agency"
    shared_artifacts_read:
      - lesson_id
      - time_remaining
    shared_artifacts_written: []

  - id: step-9
    name: "Lesson 3 Content"
    action: "Marcus reads Lesson 3: Procs vs Lambdas"
    touchpoint: "Lesson view with Python comparison panel"
    marcus_thought: "Python has lambda. Ruby has proc AND lambda — and they differ on return semantics. Important distinction."
    emotion: engaged-learning
    emotional_intensity: 8
    pain_points:
      - "Procs vs Lambdas is genuinely complex — lesson must handle nuance carefully"
    shared_artifacts_read:
      - lesson_id
      - lesson_content
    shared_artifacts_written: []

  - id: step-10
    name: "Lesson Exercise"
    action: "Marcus completes Lesson 3 exercise: return behavior of proc vs lambda"
    touchpoint: "Exercise panel with 30-second timer"
    marcus_thought: "Lambda returns from the lambda. Proc returns from the enclosing method. Got it."
    emotion: confident-new-knowledge
    emotional_intensity: 8
    pain_points: []
    shared_artifacts_read:
      - exercise_id
      - lesson_id
    shared_artifacts_written:
      - sm2_score
      - answer_result
      - timer_seconds

  - id: step-11
    name: "SM-2 Scheduling for New Lesson"
    action: "Marcus sees Procs vs Lambdas scheduled for review in 3 days"
    touchpoint: "SM-2 scheduling confirmation panel"
    marcus_thought: "Automatic. I'll see this in my queue on March 15."
    emotion: trusting
    emotional_intensity: 7
    pain_points: []
    shared_artifacts_read:
      - exercise_id
      - sm2_score
    shared_artifacts_written:
      - next_review_date
      - sm2_interval
      - review_queue

  - id: step-12
    name: "Session Summary"
    action: "Marcus reads full session summary: time, streak, SM-2 updates"
    touchpoint: "Session end screen"
    marcus_thought: "11 minutes 24 seconds. 7-day streak. Under target. Perfect morning."
    emotion: streak-pride
    emotional_intensity: 9
    pain_points: []
    shared_artifacts_read:
      - session_duration
      - streak_count
      - lessons_completed
      - next_review_date
    shared_artifacts_written:
      - session_duration
      - streak_count

integration_checkpoints:
  - id: ic-1
    step: step-2
    check: "review_queue in email == review_queue shown in app session start screen"
    failure_risk: "Marcus sees different exercises in app than email listed"

  - id: ic-2
    step: step-3
    check: "timer_seconds at submission feeds into sm2_score calculation"
    failure_risk: "SM-2 interval calibration ignores response speed signal"

  - id: ic-3
    step: step-7
    check: "review_duration accumulates accurately across 4 exercises"
    failure_risk: "Session summary shows wrong review time"

  - id: ic-4
    step: step-8
    check: "time_remaining updates in real time after each completed exercise"
    failure_risk: "Marcus starts lesson without knowing he has enough time budget"

  - id: ic-5
    step: step-12
    check: "streak_count increments exactly once per calendar day (not per session)"
    failure_risk: "Multiple sessions in one day inflate streak counter"

shared_artifacts:
  read:
    - review_queue
    - queue_count
    - streak_count
    - time_remaining
    - exercise_id
    - lesson_id
    - lesson_content
    - sm2_score
    - answer_result
    - review_duration
  written:
    - sm2_score
    - answer_result
    - timer_seconds
    - review_duration
    - next_review_date
    - sm2_interval
    - review_queue
    - session_duration
    - streak_count
    - lessons_completed
